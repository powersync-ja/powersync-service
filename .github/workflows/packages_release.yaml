name: Packages Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # For dev publishing

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  id-token: write # Required for OIDC / trusted publishing
  contents: write # Required for changesets pushing commits
  pull-requests: write # Required for changesets creating PRs

jobs:
  release-packages:
    name: Release Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          # check out full history. development packages need this for changesets
          fetch-depth: 0
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Update npm
        run: |
          npm install -g npm@latest
          npm --version

      - name: Build
        run: pnpm build:production

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        if: ${{ github.event_name == 'push' }}
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: pnpm release
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug Outputs
        if: ${{ github.event_name == 'push' }}
        run: |
          echo "Published Packages: ${{ steps.changesets.outputs.publishedPackages }}"

      - name: Create service version tag
        id: service_version_tag
        if: ${{ github.event_name == 'push' && steps.changesets.outputs.published == 'true' }}
        run: |
          packages="${{ toJson(steps.changesets.outputs.publishedPackages) }}"

          set +e
          echo "$packages" | jq -e '[.[] | select(.name == "@powersync/service-image")] | length > 0' > /dev/null
          jq_exit_code=$?
          set -e

          if [ $jq_exit_code -ne 0 ]; then
            echo "Skipping service version tag because @powersync/service-image was not released."
            echo "create_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --tags

          version="$(node -p "require('./service/package.json').version")"
          version_tag="v$version"
          echo "tag=$version_tag" >> "$GITHUB_OUTPUT"
          echo "create_release=true" >> "$GITHUB_OUTPUT"

          if git rev-parse --verify "refs/tags/$version_tag" >/dev/null 2>&1; then
            echo "$version_tag already exists."
            exit 0
          fi

          git tag "$version_tag"
          git push origin "$version_tag"

      - name: Create draft GitHub release
        if: ${{ github.event_name == 'push' && steps.service_version_tag.outputs.create_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version_tag="${{ steps.service_version_tag.outputs.tag }}"

          if gh release view "$version_tag" >/dev/null 2>&1; then
            echo "GitHub release $version_tag already exists."
            exit 0
          fi

          gh release create "$version_tag" \
            --draft \
            --generate-notes \
            --title "$version_tag" \
            --verify-tag

      - name: Dev publish
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          # If no changesets are available the status check will fail
          # We should not continue if there are no changesets    
          pnpm changeset status
          pnpm changeset version --snapshot dev
          pnpm changeset publish --tag dev
